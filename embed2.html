  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #1a202c;
      transition: background-color 2s ease;
      overflow-x: hidden;
      font-family: 'Roboto', sans-serif;
    }

    body.bg-black {
      background-color: #000;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 5vw 40px;
      color: #eee;
    }

    .card-container {
      background-color: #000;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      width: 90vw;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      opacity: 0;
      transform: scale(0.5);
      transform-origin: center;
      transition: box-shadow 1.5s ease;
      margin: 0 auto;
    }

    .card-container iframe {
      background-color: #000;
      border-radius: 1rem;
    }

    .card-container.active {
      animation: openCard 1.5s ease-out forwards;
    }

    .card-container.white-shadow {
      box-shadow: 0 0 40px 5px rgba(255, 255, 255, 0.7);
    }

    @keyframes openCard {
      0% {
        opacity: 0;
        transform: scale(0.5);
        width: 0;
      }
      50% {
        opacity: 1;
        transform: scale(0.75);
        width: 45vw;
      }
      100% {
        opacity: 1;
        transform: scale(1);
        width: 90vw;
        max-width: 800px;
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Programação do Canal */
    .programacao-container {
      background-color: #000;
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      width: 90vw;
      max-width: 800px;
      min-height: 400px;
      margin: 20px auto 0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease;
    }

    .programacao-container.active {
      opacity: 1;
      transform: translateY(0);
    }

    .programacao-container iframe {
      background-color: #fff;
      border-radius: 1rem;
      min-height: 400px;
    }

    .programacao-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px 20px;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 400px) {
      .wrapper {
        padding: 15px 3vw 40px;
      }
      
      .programacao-header {
        font-size: 16px;
        padding: 12px 15px;
      }
    }
  </style>
</head>

    </div>
